<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>triple7 · hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #ffffff;
    }

    .hub-card {
      max-width: 880px;
      width: 100%;
      background: #000000;
      border: 1px solid #333333;
      padding: 40px 36px;
    }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 44px;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #ffffff;
    }

    .back-link {
      color: #cccccc;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.2rem;
      border-bottom: 1px solid #555555;
    }

    .back-link:hover {
      color: #ffffff;
      border-bottom-color: #ffffff;
    }

    .script-block {
      margin-bottom: 40px;
      border-left: 4px solid #444444;
      padding-left: 24px;
    }

    .script-title {
      font-size: 2.2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .script-desc {
      font-size: 1.1rem;
      color: #bbbbbb;
      margin-bottom: 28px;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .btn {
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 600;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 12px 32px;
      background: transparent;
      border: 2px solid #ffffff;
      color: #ffffff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: 0.1s;
    }

    .btn:hover {
      background: #ffffff;
      color: #000000;
    }

    .footer-meta {
      margin-top: 32px;
      text-align: right;
      font-size: 0.8rem;
      color: #777777;
    }

    @media (max-width: 600px) {
      .hub-card { padding: 28px 20px; }
      .script-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <div class="hub-card">
    <div class="header-row">
      <h1>TRIPLE7 HUB</h1>
      <a href="index.html" class="back-link">← HOME</a>
    </div>

    <!-- UNIVERSAL SCRIPT -->
    <div class="script-block">
      <div class="script-title">UNIVERSAL SCRIPT</div>
      <div class="script-desc">
        Stable executor · broad compatibility · updated regularly.
      </div>
      <div class="button-group">
        <a href="#" class="btn" id="universal-source">VIEW SOURCE</a>
        <a href="#" class="btn" id="universal-loadstring">OPEN LOADSTRING</a>
      </div>
    </div>

    <!-- PROJECT DELTA -->
    <div class="script-block">
      <div class="script-title">PROJECT DELTA</div>
      <div class="script-desc">
        Experimental features · advanced API · cutting‑edge.
      </div>
      <div class="button-group">
        <a href="#" class="btn" id="delta-source">VIEW SOURCE</a>
        <a href="#" class="btn" id="delta-loadstring">OPEN LOADSTRING</a>
      </div>
    </div>

    <div class="footer-meta">
      triple7 · github pages
    </div>
  </div>

  <script>
    (function() {
      // ---------- REPLACE THESE WITH YOUR ACTUAL LINKS ----------
      const UNIVERSAL_SOURCE_LINK = 'linksourceplaceholder1';
      const UNIVERSAL_LOADSTRING_LINK = 'linkloadstringplaceholder1';
      const DELTA_SOURCE_LINK = 'linksourceplaceholder2';
      const DELTA_LOADSTRING_LINK = 'linkloadstringplaceholder2';

      // Universal
      document.getElementById('universal-source').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(UNIVERSAL_SOURCE_LINK, '_blank');
      });
      document.getElementById('universal-loadstring').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(UNIVERSAL_LOADSTRING_LINK, '_blank');
      });

      // Delta
      document.getElementById('delta-source').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(DELTA_SOURCE_LINK, '_blank');
      });
      document.getElementById('delta-loadstring').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(DELTA_LOADSTRING_LINK, '_blank');
      });
    })();
  </script>
</body>
</html>
