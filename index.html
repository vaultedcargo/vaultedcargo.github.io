<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>triple7 · home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0d13;
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #ececec;
    }

    .card {
      max-width: 800px;
      width: 100%;
      background: #12181f;
      border: 1px solid #2a3848;
      padding: 48px 40px;
    }

    h1 {
      font-size: 4.5rem;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subhead {
      font-size: 1.2rem;
      font-weight: 400;
      color: #8b9eb5;
      border-bottom: 1px solid #253544;
      padding-bottom: 24px;
      margin-bottom: 32px;
    }

    .info {
      font-size: 1.2rem;
      line-height: 1.5;
      margin-bottom: 48px;
      color: #cbdae8;
    }

    .btn {
      display: inline-block;
      background: transparent;
      color: #ffffff;
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 600;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      padding: 16px 48px;
      border: 2px solid #3a5f82;
      text-decoration: none;
      transition: 0.1s;
    }

    .btn:hover {
      background: #1d344b;
      border-color: #5a8fc9;
    }

    .footer-note {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #5e748b;
    }

    @media (max-width: 500px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>triple7</h1>
    <div class="subhead">universal · delta · clean</div>

    <div class="info">
      <strong>UNIVERSAL SCRIPT</strong> — stable, wide compatibility.<br>
      <strong>PROJECT DELTA</strong> — experimental, edge features.
    </div>

    <a href="hub.html" class="btn">GET STARTED</a>

    <div class="footer-note">
      triple7 · script hub
    </div>
  </div>
</body>
</html>
