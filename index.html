<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>triple7 · home</title>
  <!-- Roboto Condensed -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0f14;
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #e0e0e0;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #141a22;
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      border: 1px solid #2a3645;
    }

    h1 {
      font-size: 4.2rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .subhead {
      font-size: 1.3rem;
      font-weight: 400;
      color: #9aaec2;
      margin-bottom: 28px;
      border-bottom: 1px solid #2a3645;
      padding-bottom: 20px;
    }

    .info-card {
      background: #0f151e;
      border-radius: 18px;
      padding: 24px 28px;
      margin: 28px 0 36px;
      border: 1px solid #263340;
    }

    .info-card p {
      font-size: 1.15rem;
      line-height: 1.5;
      color: #cddcec;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      background: #1f3a5f;
      color: white;
      font-family: 'Roboto Condensed', sans-serif;
      font-weight: 600;
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 16px 44px;
      border-radius: 50px;
      text-decoration: none;
      border: 1px solid #3f6b9c;
      box-shadow: 0 8px 0 #0b1219;
      transition: all 0.08s ease;
    }

    .btn:hover {
      background: #2b4f7a;
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #0b1219;
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0b1219;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 0.9rem;
      color: #6e8299;
      text-align: center;
    }

    @media (max-width: 500px) {
      .container { padding: 28px 20px; }
      h1 { font-size: 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>triple7</h1>
    <div class="subhead">universal · delta · performance</div>

    <div class="info-card">
      <p><strong>UNIVERSAL SCRIPT</strong> — stable executor, wide compatibility.<br>
      <strong>PROJECT DELTA</strong> — experimental, bleeding‑edge features.</p>
      <p style="margin-top: 14px; opacity: 0.8;">Click below to access loadstrings and source code.</p>
    </div>

    <div style="text-align: center;">
      <a href="hub.html" class="btn">GET STARTED</a>
    </div>

    <div class="footer-note">
      triple7 · script hub · placeholder links active on hub page
    </div>
  </div>
</body>
</html>
